schema_version: 1
name: openclaw-integration-example
modes:
  gateway_http:
    OPENCLAW_GATEWAY_URL: "http://127.0.0.1:18789"
    OPENCLAW_MODE: "gateway_http"
    health_path: "/health"
    chat_path: "/chat"
    tool_calls_path: "/tool-calls"
  gateway_ws:
    OPENCLAW_GATEWAY_URL: "ws://127.0.0.1:18789"
    OPENCLAW_MODE: "gateway_ws"
    events_path: "/events"
  a2a:
    OPENCLAW_MODE: "a2a"
    A2A_GATEWAY_URL: "http://127.0.0.1:18800"
    A2A_AGENT_ID: "main"
  cli:
    OPENCLAW_MODE: "cli"
    OPENCLAW_CLI_PATH: "openclaw"
safety:
  sandbox: true
  allow_real_tools: false
  require_human_confirmation_for_real_tools: true
