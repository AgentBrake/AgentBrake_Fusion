name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            path: tests/test_*.py tests/policy_engine
          - name: agentdojo
            path: tests/eval/agentdojo
          - name: agent-safetybench
            path: tests/eval/agent_safetybench
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Compile
        run: python -m compileall -q src
      - name: Test ${{ matrix.name }}
        run: python -m pytest -q --basetemp .pytest_tmp ${{ matrix.path }}
      - name: Ruff
        run: python -m ruff check src tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/studio/package-lock.json
      - name: Build Studio frontend
        working-directory: web/studio
        run: |
          npm ci
          npm run build
